<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Highlighter</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>Word Highlighter</h1>
      <div class="toggle-container">
        <span>Highlighting</span>
        <label class="switch">
          <input type="checkbox" id="enableToggle" checkedContent="true">
          <span class="slider round"></span>
        </label>
      </div>
    </header>

    <div class="input-section">
      <input type="text" id="wordInput" placeholder="Add word or phrase..." autocomplete="off">
      <button id="addButton">Add</button>
    </div>

    <div class="list-section">
      <ul id="wordList">
        <!-- Words will be added here -->
      </ul>
    </div>

    <footer>
      <p id="status">Ready to highlight</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
